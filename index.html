<!DOCTYPE html>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1c1c1c, #000);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .phone {
      width: 390px;
      min-height: 760px;
      background: #070707;
      border: 2px solid #c89b3c;
      border-radius: 38px;
      padding: 28px 22px;
      box-shadow: 0 0 35px rgba(200,155,60,.35);
    }

    .logo {
      text-align: center;
      color: #d6aa4b;
      font-size: 32px;
      letter-spacing: 4px;
      margin-bottom: 10px;
      font-weight: bold;
    }

    h1 {
      text-align: center;
      color: #d6aa4b;
      font-size: 22px;
      letter-spacing: 2px;
      margin: 20px 0 8px;
    }

    p {
      text-align: center;
      color: #ccc;
      font-size: 14px;
      margin-bottom: 35px;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(145deg, #111, #050505);
      border: 1px solid #b8862f;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      transition: .3s;
    }

    .link:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 18px rgba(214,170,75,.35);
    }

    .left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .icon {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #f8d477, #b8862f);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }

    .text strong {
      display: block;
      font-size: 16px;
    }

    .text span {
      color: #d6aa4b;
      font-size: 13px;
    }

    .arrow {
      color: #d6aa4b;
      font-size: 24px;
    }
  </style>
</head>
